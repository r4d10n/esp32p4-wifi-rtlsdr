<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32-P4 FM Radio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e; color: #e0e0e0;
    display: flex; justify-content: center; padding: 20px;
    min-height: 100vh;
}
.container { max-width: 480px; width: 100%; }
h1 { text-align: center; color: #e94560; margin-bottom: 20px; font-size: 1.4em; }

.freq-display {
    background: #16213e; border: 2px solid #e94560; border-radius: 12px;
    padding: 20px; text-align: center; margin-bottom: 20px;
}
.freq-value {
    font-family: 'Courier New', monospace; font-size: 2.8em;
    color: #00ff88; letter-spacing: 2px;
}
.freq-unit { color: #888; font-size: 0.8em; margin-left: 8px; }

.tune-row { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
.tune-btn {
    background: #0f3460; border: 1px solid #e94560; color: #e0e0e0;
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.9em;
}
.tune-btn:hover { background: #e94560; color: white; }
.tune-btn:active { transform: scale(0.95); }

.control-group {
    background: #16213e; border-radius: 10px; padding: 16px; margin-bottom: 12px;
}
.control-label { color: #888; font-size: 0.85em; margin-bottom: 6px; display: flex; justify-content: space-between; }
.control-label span { color: #00ff88; }
input[type="range"] {
    width: 100%; accent-color: #e94560; height: 6px;
    -webkit-appearance: none; background: #0f3460; border-radius: 3px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    background: #e94560; border-radius: 50%; cursor: pointer;
}

.mode-row { display: flex; gap: 8px; margin-bottom: 12px; }
.mode-btn {
    flex: 1; padding: 12px; text-align: center; border-radius: 8px;
    background: #0f3460; border: 2px solid transparent; cursor: pointer;
    font-weight: bold; transition: all 0.2s;
}
.mode-btn.active { border-color: #e94560; background: #1a1a4e; color: #e94560; }

.meter {
    height: 8px; background: #0f3460; border-radius: 4px; overflow: hidden; margin-top: 4px;
}
.meter-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #e94560); transition: width 0.3s; }

.action-btn {
    width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #e94560;
    background: transparent; color: #e94560; font-size: 1.1em; cursor: pointer;
    font-weight: bold; transition: all 0.2s; margin-bottom: 8px;
}
.action-btn.active { background: #e94560; color: white; }
.action-btn.playing { border-color: #00ff88; color: #00ff88; }
.action-btn.playing.active { background: #00ff88; color: #1a1a2e; }

select {
    width: 100%; padding: 10px; background: #0f3460; color: #e0e0e0;
    border: 1px solid #333; border-radius: 6px; font-size: 0.95em;
}

/* RDS display */
.rds-box {
    background: #0a0a1a; border: 1px solid #333; border-radius: 8px;
    padding: 12px; margin-top: 10px; text-align: center;
}
.rds-ps { color: #00ff88; font-family: 'Courier New', monospace; font-size: 1.4em; letter-spacing: 3px; }
.rds-rt { color: #aaa; font-size: 0.85em; margin-top: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rds-meta { color: #666; font-size: 0.75em; margin-top: 4px; }
.stereo-badge { display: inline-block; background: #e94560; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7em; font-weight: bold; margin-left: 8px; }
.stereo-badge.mono { background: #444; }

/* Audio level meter */
.audio-meter { height: 4px; background: #0f3460; border-radius: 2px; margin-top: 8px; }
.audio-meter-fill { height: 100%; background: #00ff88; border-radius: 2px; width: 0%; transition: width 0.1s; }
</style>
</head>
<body>
<div class="container">
    <h1>ESP32-P4 FM Radio</h1>

    <div class="freq-display">
        <div><span class="freq-value" id="freqDisplay">100.000</span><span class="freq-unit">MHz</span></div>
        <div class="tune-row">
            <button class="tune-btn" onclick="tune(-1000000)">-1M</button>
            <button class="tune-btn" onclick="tune(-100000)">-100k</button>
            <button class="tune-btn" onclick="tune(-25000)">-25k</button>
            <button class="tune-btn" onclick="tune(25000)">+25k</button>
            <button class="tune-btn" onclick="tune(100000)">+100k</button>
            <button class="tune-btn" onclick="tune(1000000)">+1M</button>
        </div>
        <div class="tune-row">
            <button class="tune-btn" onclick="scanDown()">&#9664; Scan</button>
            <button class="tune-btn" onclick="scanStop()">Stop</button>
            <button class="tune-btn" onclick="scanUp()">Scan &#9654;</button>
        </div>
        <div class="rds-box" id="rdsBox">
            <span class="rds-ps" id="rdsPS"></span>
            <span class="stereo-badge mono" id="stereoBadge">MONO</span>
            <div class="rds-rt" id="rdsRT"></div>
            <div class="rds-meta" id="rdsMeta"></div>
        </div>
    </div>

    <div class="control-group">
        <div class="control-label">Signal<span id="sigVal">--</span></div>
        <div class="meter"><div class="meter-fill" id="sigMeter" style="width:0%"></div></div>
    </div>

    <div class="mode-row">
        <div class="mode-btn active" id="btnWBFM" onclick="setMode(0)">WBFM</div>
        <div class="mode-btn" id="btnNBFM" onclick="setMode(1)">NBFM</div>
    </div>

    <div class="control-group">
        <div class="control-label">Volume<span id="volVal">90</span></div>
        <input type="range" id="volume" min="0" max="100" value="90" oninput="setVolume(this.value)">
    </div>

    <div class="control-group">
        <div class="control-label">Gain</div>
        <select id="gain" onchange="setGain(this.value)">
            <option value="0">Auto</option>
            <option value="9">0.9 dB</option>
            <option value="14">1.4 dB</option>
            <option value="27">2.7 dB</option>
            <option value="37">3.7 dB</option>
            <option value="77">7.7 dB</option>
            <option value="87">8.7 dB</option>
            <option value="125">12.5 dB</option>
            <option value="144">14.4 dB</option>
            <option value="166">16.6 dB</option>
            <option value="197">19.7 dB</option>
            <option value="207">20.7 dB</option>
            <option value="229">22.9 dB</option>
            <option value="254">25.4 dB</option>
            <option value="290">29.0 dB</option>
            <option value="321">32.1 dB</option>
            <option value="345">34.5 dB</option>
            <option value="378">37.8 dB</option>
            <option value="403">40.3 dB</option>
            <option value="420">42.0 dB</option>
            <option value="434">43.4 dB</option>
            <option value="439">43.9 dB</option>
            <option value="445">44.5 dB</option>
            <option value="480">48.0 dB</option>
            <option value="496" selected>49.6 dB</option>
        </select>
    </div>

    <div class="control-group">
        <div class="control-label">Filter BW<span id="bwVal">15 kHz</span></div>
        <input type="range" id="filterbw" min="3000" max="150000" value="15000" step="1000" oninput="setFilterBW(this.value)">
    </div>

    <div class="control-group">
        <div class="control-label">Squelch<span id="sqVal">0</span></div>
        <input type="range" id="squelch" min="0" max="100" value="0" oninput="setSquelch(this.value)">
    </div>

    <div class="control-group">
        <div class="control-label">Noise Blanker
            <label style="cursor:pointer"><input type="checkbox" id="nbEnable" onchange="setNB()" checked> ON</label>
        </div>
        <div class="control-label">NB Threshold<span id="nbVal">5</span></div>
        <input type="range" id="nbThresh" min="1" max="10" value="5" oninput="setNB()">
    </div>

    <button class="action-btn" id="muteBtn" onclick="toggleMute()">MUTE</button>

    <button class="action-btn playing" id="audioBtn" onclick="toggleAudio()">&#9654; Browser Audio</button>
    <div class="audio-meter" id="audioMeterBox" style="display:none">
        <div class="audio-meter-fill" id="audioMeter"></div>
    </div>
    <div id="audioStatus" style="text-align:center;font-size:0.75em;color:#666;margin-bottom:12px;"></div>

    <div class="control-group" style="margin-top:12px">
        <div class="control-label">Firmware Update</div>
        <input type="file" id="otaFile" accept=".bin" style="display:none" onchange="uploadOTA()">
        <button class="tune-btn" onclick="document.getElementById('otaFile').click()" style="width:100%;padding:12px">
            Select Firmware (.bin)
        </button>
        <div id="otaProgress" style="display:none;margin-top:8px">
            <div class="meter"><div class="meter-fill" id="otaMeter" style="width:0%"></div></div>
            <div style="text-align:center;margin-top:4px;font-size:0.85em" id="otaStatus">Uploading...</div>
        </div>
    </div>
</div>

<script>
let state = {freq: 100000000, gain: 0, volume: 90, mode: 0, filter_bw: 15000, muted: false, squelch: 0, noise_blanker: {enabled: true, threshold: 5}};
let ws = null;
let audioPlaying = false, aCtx = null, wkNode = null;

/* ── AudioWorklet processor (runs in audio thread) ── */
const PROC_CODE = `
class PCMPlayer extends AudioWorkletProcessor {
  constructor() {
    super();
    this.ring = new Float32Array(48000); // 1s ring buffer
    this.wPtr = 0;
    this.rPtr = 0;
    this.count = 0;
    this.port.onmessage = (e) => {
      if (e.data.type === 'pcm') {
        const s16 = e.data.samples;
        const n = s16.length;
        for (let i = 0; i < n; i++) {
          this.ring[this.wPtr] = s16[i] / 32768.0;
          this.wPtr = (this.wPtr + 1) % this.ring.length;
          if (this.count < this.ring.length) this.count++;
        }
      }
    };
  }
  process(inputs, outputs) {
    const out = outputs[0][0];
    if (!out) return true;
    let pk = 0;
    for (let i = 0; i < out.length; i++) {
      if (this.count > 0) {
        const v = this.ring[this.rPtr];
        this.rPtr = (this.rPtr + 1) % this.ring.length;
        this.count--;
        out[i] = v;
        const a = Math.abs(v); if (a > pk) pk = a;
      } else {
        out[i] = 0;
      }
    }
    // Report level every 20 frames (~26ms at 128 samples)
    if (this._cnt === undefined) this._cnt = 0;
    if (++this._cnt % 20 === 0) {
      this.port.postMessage({pk: pk, buf: this.count});
    }
    return true;
  }
}
registerProcessor('pcm-player', PCMPlayer);
`;

function updateUI() {
    document.getElementById('freqDisplay').textContent = (state.freq / 1e6).toFixed(3);
    document.getElementById('volVal').textContent = state.volume;
    document.getElementById('bwVal').textContent = (state.filter_bw / 1000) + ' kHz';
    document.getElementById('volume').value = state.volume;
    document.getElementById('filterbw').value = state.filter_bw;
    document.getElementById('btnWBFM').className = 'mode-btn' + (state.mode === 0 ? ' active' : '');
    document.getElementById('btnNBFM').className = 'mode-btn' + (state.mode === 1 ? ' active' : '');
    document.getElementById('muteBtn').className = 'action-btn' + (state.muted ? ' active' : '');
    document.getElementById('muteBtn').textContent = state.muted ? 'UNMUTE' : 'MUTE';
    if (state.squelch !== undefined) {
        document.getElementById('squelch').value = state.squelch;
        document.getElementById('sqVal').textContent = state.squelch;
    }
    if (state.noise_blanker) {
        document.getElementById('nbEnable').checked = state.noise_blanker.enabled;
        document.getElementById('nbThresh').value = state.noise_blanker.threshold;
        document.getElementById('nbVal').textContent = state.noise_blanker.threshold;
    }
}

async function api(path, body) {
    try {
        const opts = body !== undefined ? {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)} : {};
        const r = await fetch('/api/' + path, opts);
        return await r.json();
    } catch(e) { console.error('API error:', e); return null; }
}

async function tune(delta) {
    state.freq += delta;
    if (state.freq < 24000000) state.freq = 24000000;
    if (state.freq > 1766000000) state.freq = 1766000000;
    updateUI();
    await api('freq', {value: state.freq});
}

async function setVolume(v) {
    state.volume = parseInt(v);
    document.getElementById('volVal').textContent = v;
    await api('volume', {value: state.volume});
}

async function setGain(g) {
    state.gain = parseInt(g);
    await api('gain', {value: state.gain});
}

async function setMode(m) {
    state.mode = m;
    state.filter_bw = m === 0 ? 15000 : 3000;
    updateUI();
    await api('mode', {value: m});
}

async function setFilterBW(bw) {
    state.filter_bw = parseInt(bw);
    document.getElementById('bwVal').textContent = (state.filter_bw / 1000) + ' kHz';
    await api('filter_bw', {value: state.filter_bw});
}

async function setSquelch(v) {
    state.squelch = parseInt(v);
    document.getElementById('sqVal').textContent = v;
    await api('squelch', {value: state.squelch});
}

async function toggleMute() {
    state.muted = !state.muted;
    updateUI();
    await api('mute', {value: state.muted});
}

async function setNB() {
    const enabled = document.getElementById('nbEnable').checked;
    const threshold = parseInt(document.getElementById('nbThresh').value);
    document.getElementById('nbVal').textContent = threshold;
    await api('noise_blanker', {enabled, threshold});
}

async function scanUp()   { await api('scan', {direction: 'up'}); }
async function scanDown()  { await api('scan', {direction: 'down'}); }
async function scanStop()  { await api('scan', {action: 'stop'}); }

/* ── WebSocket (signal + audio) ── */

function connectWS() {
    ws = new WebSocket('wss://' + location.host + '/ws');
    ws.binaryType = 'arraybuffer';
    ws.onmessage = (e) => {
        if (typeof e.data === 'string') {
            try {
                const d = JSON.parse(e.data);
                if (d.signal_strength !== undefined) {
                    const pct = Math.min(100, Math.max(0, d.signal_strength * 100 / 32767));
                    document.getElementById('sigMeter').style.width = pct + '%';
                    document.getElementById('sigVal').textContent = pct.toFixed(0) + '%';
                }
                if (d.stereo !== undefined) {
                    const badge = document.getElementById('stereoBadge');
                    badge.textContent = d.stereo ? 'STEREO' : 'MONO';
                    badge.className = 'stereo-badge' + (d.stereo ? '' : ' mono');
                }
            } catch(ex) {}
        } else {
            /* Binary frame = PCM int16 audio */
            if (wkNode) {
                const s16 = new Int16Array(e.data);
                wkNode.port.postMessage({type: 'pcm', samples: s16});
            }
        }
    };
    ws.onclose = () => setTimeout(connectWS, 5000);
    ws.onerror = () => { try { ws.close(); } catch(e) {} };
}

/* ── Browser Audio (AudioWorklet) ── */

async function startAudio() {
    aCtx = new AudioContext({sampleRate: 48000});
    await aCtx.resume();
    const blob = new Blob([PROC_CODE], {type: 'application/javascript'});
    const url = URL.createObjectURL(blob);
    try {
        await aCtx.audioWorklet.addModule(url);
    } finally {
        URL.revokeObjectURL(url);
    }
    wkNode = new AudioWorkletNode(aCtx, 'pcm-player');
    wkNode.port.onmessage = (e) => {
        const pct = Math.min(100, e.data.pk / 0.8 * 100);
        document.getElementById('audioMeter').style.width = pct + '%';
        document.getElementById('audioStatus').textContent =
            'buf: ' + e.data.buf + ' | peak: ' + (e.data.pk * 100).toFixed(0) + '%';
    };
    wkNode.connect(aCtx.destination);
    /* Tell ESP to stream audio */
    if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({cmd: 'audio_on'}));
    }
    document.getElementById('audioMeterBox').style.display = 'block';
}

function stopAudio() {
    if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({cmd: 'audio_off'}));
    }
    if (wkNode) { wkNode.disconnect(); wkNode = null; }
    if (aCtx) { aCtx.close(); aCtx = null; }
    document.getElementById('audioMeterBox').style.display = 'none';
    document.getElementById('audioStatus').textContent = '';
}

function toggleAudio() {
    const btn = document.getElementById('audioBtn');
    if (!audioPlaying) {
        startAudio().then(() => {
            btn.innerHTML = '&#9724; Stop Audio';
            btn.classList.add('active');
            audioPlaying = true;
        }).catch((err) => {
            document.getElementById('audioStatus').textContent = 'AudioWorklet error: ' + err;
        });
    } else {
        stopAudio();
        btn.innerHTML = '&#9654; Browser Audio';
        btn.classList.remove('active');
        audioPlaying = false;
    }
}

/* ── RDS polling ── */

async function pollRDS() {
    const r = await api('rds');
    if (r) {
        document.getElementById('rdsPS').textContent = r.ps_name || '';
        document.getElementById('rdsRT').textContent = r.radio_text || '';
        const meta = [];
        if (r.pi_code && r.pi_code !== '0x0000') meta.push('PI:' + r.pi_code);
        if (r.pty > 0) meta.push('PTY:' + r.pty);
        if (r.tp) meta.push('TP');
        document.getElementById('rdsMeta').textContent = meta.join(' | ');
        if (r.stereo !== undefined) {
            const badge = document.getElementById('stereoBadge');
            badge.textContent = r.stereo ? 'STEREO' : 'MONO';
            badge.className = 'stereo-badge' + (r.stereo ? '' : ' mono');
        }
    }
}

/* ── OTA ── */

async function uploadOTA() {
    const file = document.getElementById('otaFile').files[0];
    if (!file) return;
    document.getElementById('otaProgress').style.display = 'block';
    document.getElementById('otaStatus').textContent = 'Uploading ' + (file.size/1024).toFixed(0) + ' KB...';
    try {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/ota');
        xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
                const pct = (e.loaded / e.total * 100).toFixed(0);
                document.getElementById('otaMeter').style.width = pct + '%';
                document.getElementById('otaStatus').textContent = 'Uploading... ' + pct + '%';
            }
        };
        xhr.onload = () => {
            document.getElementById('otaStatus').textContent = 'Complete! Rebooting...';
            setTimeout(() => location.reload(), 5000);
        };
        xhr.onerror = () => { document.getElementById('otaStatus').textContent = 'Upload failed!'; };
        xhr.send(file);
    } catch(e) {
        document.getElementById('otaStatus').textContent = 'Error: ' + e.message;
    }
}

/* ── Init ── */
(async () => {
    const s = await api('status');
    if (s) { Object.assign(state, s); updateUI(); }
    connectWS();
    setInterval(pollRDS, 5000);
})();
</script>
</body>
</html>
