<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32-P4 FM Radio (Mono)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e; color: #e0e0e0;
    display: flex; justify-content: center; padding: 20px;
    min-height: 100vh;
}
.container { max-width: 480px; width: 100%; }
h1 { text-align: center; color: #e94560; margin-bottom: 20px; font-size: 1.4em; }

.freq-display {
    background: #16213e; border: 2px solid #e94560; border-radius: 12px;
    padding: 20px; text-align: center; margin-bottom: 20px;
}
.freq-value {
    font-family: 'Courier New', monospace; font-size: 2.8em;
    color: #00ff88; letter-spacing: 2px;
}
.freq-unit { color: #888; font-size: 0.8em; margin-left: 8px; }

.tune-row { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
.tune-btn {
    background: #0f3460; border: 1px solid #e94560; color: #e0e0e0;
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.9em;
}
.tune-btn:hover { background: #e94560; color: white; }
.tune-btn:active { transform: scale(0.95); }

.control-group {
    background: #16213e; border-radius: 10px; padding: 16px; margin-bottom: 12px;
}
.control-label { color: #888; font-size: 0.85em; margin-bottom: 6px; display: flex; justify-content: space-between; }
.control-label span { color: #00ff88; }
input[type="range"] {
    width: 100%; accent-color: #e94560; height: 6px;
    -webkit-appearance: none; background: #0f3460; border-radius: 3px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    background: #e94560; border-radius: 50%; cursor: pointer;
}

.meter {
    height: 8px; background: #0f3460; border-radius: 4px; overflow: hidden; margin-top: 4px;
}
.meter-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #e94560); transition: width 0.3s; }

.action-btn {
    width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #e94560;
    background: transparent; color: #e94560; font-size: 1.1em; cursor: pointer;
    font-weight: bold; transition: all 0.2s; margin-bottom: 8px;
}
.action-btn.active { background: #e94560; color: white; }
.action-btn.playing { border-color: #00ff88; color: #00ff88; }
.action-btn.playing.active { background: #00ff88; color: #1a1a2e; }

select {
    width: 100%; padding: 10px; background: #0f3460; color: #e0e0e0;
    border: 1px solid #333; border-radius: 6px; font-size: 0.95em;
}

.audio-meter { height: 4px; background: #0f3460; border-radius: 2px; margin-top: 8px; }
.audio-meter-fill { height: 100%; background: #00ff88; border-radius: 2px; width: 0%; transition: width 0.1s; }
</style>
</head>
<body>
<div class="container">
    <h1>ESP32-P4 FM Radio (Mono)</h1>

    <div class="freq-display">
        <div><span class="freq-value" id="freqDisplay">100.000</span><span class="freq-unit">MHz</span></div>
        <div class="tune-row">
            <button class="tune-btn" onclick="tune(-1000000)">-1M</button>
            <button class="tune-btn" onclick="tune(-100000)">-100k</button>
            <button class="tune-btn" onclick="tune(-25000)">-25k</button>
            <button class="tune-btn" onclick="tune(25000)">+25k</button>
            <button class="tune-btn" onclick="tune(100000)">+100k</button>
            <button class="tune-btn" onclick="tune(1000000)">+1M</button>
        </div>
    </div>

    <div class="control-group">
        <div class="control-label">Signal<span id="sigVal">--</span></div>
        <div class="meter"><div class="meter-fill" id="sigMeter" style="width:0%"></div></div>
    </div>

    <div class="control-group">
        <div class="control-label">Volume<span id="volVal">90</span></div>
        <input type="range" id="volume" min="0" max="100" value="90" oninput="setVolume(this.value)">
    </div>

    <div class="control-group">
        <div class="control-label">Gain</div>
        <select id="gain" onchange="setGain(this.value)">
            <option value="0">Auto</option>
            <option value="9">0.9 dB</option>
            <option value="14">1.4 dB</option>
            <option value="27">2.7 dB</option>
            <option value="37">3.7 dB</option>
            <option value="77">7.7 dB</option>
            <option value="87">8.7 dB</option>
            <option value="125">12.5 dB</option>
            <option value="144">14.4 dB</option>
            <option value="166">16.6 dB</option>
            <option value="197">19.7 dB</option>
            <option value="207">20.7 dB</option>
            <option value="229">22.9 dB</option>
            <option value="254">25.4 dB</option>
            <option value="290">29.0 dB</option>
            <option value="321">32.1 dB</option>
            <option value="345">34.5 dB</option>
            <option value="378">37.8 dB</option>
            <option value="403">40.3 dB</option>
            <option value="420">42.0 dB</option>
            <option value="434">43.4 dB</option>
            <option value="439">43.9 dB</option>
            <option value="445">44.5 dB</option>
            <option value="480">48.0 dB</option>
            <option value="496" selected>49.6 dB</option>
        </select>
    </div>

    <button class="action-btn" id="muteBtn" onclick="toggleMute()">MUTE</button>

    <button class="action-btn playing" id="audioBtn" onclick="toggleAudio()">&#9654; Browser Audio</button>
    <div class="audio-meter" id="audioMeterBox" style="display:none">
        <div class="audio-meter-fill" id="audioMeter"></div>
    </div>
    <div id="audioStatus" style="text-align:center;font-size:0.75em;color:#666;margin-bottom:12px;"></div>
</div>

<script>
let state = {freq: 100000000, gain: 0, volume: 90, muted: false};
let ws = null;
let audioPlaying = false, aCtx = null, wkNode = null;

const PROC_CODE = `
class PCMPlayer extends AudioWorkletProcessor {
  constructor() {
    super();
    this.ring = new Float32Array(48000);
    this.wPtr = 0;
    this.rPtr = 0;
    this.count = 0;
    this.port.onmessage = (e) => {
      if (e.data.type === 'pcm') {
        const s16 = e.data.samples;
        const n = s16.length;
        for (let i = 0; i < n; i++) {
          this.ring[this.wPtr] = s16[i] / 32768.0;
          this.wPtr = (this.wPtr + 1) % this.ring.length;
          if (this.count < this.ring.length) this.count++;
        }
      }
    };
  }
  process(inputs, outputs) {
    const out = outputs[0][0];
    if (!out) return true;
    let pk = 0;
    for (let i = 0; i < out.length; i++) {
      if (this.count > 0) {
        const v = this.ring[this.rPtr];
        this.rPtr = (this.rPtr + 1) % this.ring.length;
        this.count--;
        out[i] = v;
        const a = Math.abs(v); if (a > pk) pk = a;
      } else {
        out[i] = 0;
      }
    }
    if (this._cnt === undefined) this._cnt = 0;
    if (++this._cnt % 20 === 0) {
      this.port.postMessage({pk: pk, buf: this.count});
    }
    return true;
  }
}
registerProcessor('pcm-player', PCMPlayer);
`;

function updateUI() {
    document.getElementById('freqDisplay').textContent = (state.freq / 1e6).toFixed(3);
    document.getElementById('volVal').textContent = state.volume;
    document.getElementById('volume').value = state.volume;
    document.getElementById('muteBtn').className = 'action-btn' + (state.muted ? ' active' : '');
    document.getElementById('muteBtn').textContent = state.muted ? 'UNMUTE' : 'MUTE';
}

async function api(path, body) {
    try {
        const opts = body !== undefined ? {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)} : {};
        const r = await fetch('/api/' + path, opts);
        return await r.json();
    } catch(e) { return null; }
}

async function tune(delta) {
    state.freq += delta;
    if (state.freq < 24000000) state.freq = 24000000;
    if (state.freq > 1766000000) state.freq = 1766000000;
    updateUI();
    await api('freq', {value: state.freq});
}

async function setVolume(v) {
    state.volume = parseInt(v);
    document.getElementById('volVal').textContent = v;
    await api('volume', {value: state.volume});
}

async function setGain(g) {
    state.gain = parseInt(g);
    await api('gain', {value: state.gain});
}

async function toggleMute() {
    state.muted = !state.muted;
    updateUI();
    await api('volume', {value: state.muted ? 0 : state.volume});
}

/* WebSocket */
function connectWS() {
    ws = new WebSocket('wss://' + location.host + '/ws');
    ws.binaryType = 'arraybuffer';
    ws.onmessage = (e) => {
        if (typeof e.data === 'string') {
            try {
                const d = JSON.parse(e.data);
                if (d.signal_strength !== undefined) {
                    const pct = Math.min(100, Math.max(0, d.signal_strength * 100 / 32767));
                    document.getElementById('sigMeter').style.width = pct + '%';
                    document.getElementById('sigVal').textContent = pct.toFixed(0) + '%';
                }
            } catch(ex) {}
        } else {
            if (wkNode) {
                const s16 = new Int16Array(e.data);
                wkNode.port.postMessage({type: 'pcm', samples: s16});
            }
        }
    };
    ws.onclose = () => setTimeout(connectWS, 5000);
    ws.onerror = () => { try { ws.close(); } catch(e) {} };
}

async function startAudio() {
    aCtx = new AudioContext({sampleRate: 48000});
    await aCtx.resume();
    const blob = new Blob([PROC_CODE], {type: 'application/javascript'});
    const url = URL.createObjectURL(blob);
    try {
        await aCtx.audioWorklet.addModule(url);
    } finally {
        URL.revokeObjectURL(url);
    }
    wkNode = new AudioWorkletNode(aCtx, 'pcm-player');
    wkNode.port.onmessage = (e) => {
        const pct = Math.min(100, e.data.pk / 0.8 * 100);
        document.getElementById('audioMeter').style.width = pct + '%';
        document.getElementById('audioStatus').textContent =
            'buf: ' + e.data.buf + ' | peak: ' + (e.data.pk * 100).toFixed(0) + '%';
    };
    wkNode.connect(aCtx.destination);
    if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({cmd: 'audio_on'}));
    }
    document.getElementById('audioMeterBox').style.display = 'block';
}

function stopAudio() {
    if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({cmd: 'audio_off'}));
    }
    if (wkNode) { wkNode.disconnect(); wkNode = null; }
    if (aCtx) { aCtx.close(); aCtx = null; }
    document.getElementById('audioMeterBox').style.display = 'none';
    document.getElementById('audioStatus').textContent = '';
}

function toggleAudio() {
    const btn = document.getElementById('audioBtn');
    if (!audioPlaying) {
        startAudio().then(() => {
            btn.innerHTML = '&#9724; Stop Audio';
            btn.classList.add('active');
            audioPlaying = true;
        }).catch((err) => {
            document.getElementById('audioStatus').textContent = 'Error: ' + err;
        });
    } else {
        stopAudio();
        btn.innerHTML = '&#9654; Browser Audio';
        btn.classList.remove('active');
        audioPlaying = false;
    }
}

(async () => {
    const s = await api('status');
    if (s) { Object.assign(state, s); updateUI(); }
    connectWS();
})();
</script>
</body>
</html>
