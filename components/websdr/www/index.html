<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32-P4 WebSDR</title>
<link rel="stylesheet" href="/sdr.css">
</head>
<body>
<div id="app">
  <div id="header">
    <h1>ESP32-P4 WebSDR</h1>
    <span id="status" class="disconnected">Disconnected</span>
  </div>

  <div id="info-bar">
    <span id="freq-display">--- MHz</span>
    <span id="rate-display">---</span>
    <span id="smeter">S0</span>
  </div>

  <div id="display">
    <canvas id="spectrum"></canvas>
    <canvas id="waterfall"></canvas>
  </div>

  <div id="controls">
    <div class="ctrl-group">
      <label>Frequency (MHz)</label>
      <input type="number" id="freq-input" step="0.001" min="24" max="1766" value="100.000">
      <button id="freq-set">Set</button>
    </div>

    <div class="ctrl-group">
      <label>Mode</label>
      <div id="mode-btns">
        <button class="mode-btn" data-mode="NFM">NFM</button>
        <button class="mode-btn" data-mode="AM">AM</button>
        <button class="mode-btn active" data-mode="WBFM">WBFM</button>
        <button class="mode-btn" data-mode="USB">USB</button>
        <button class="mode-btn" data-mode="LSB">LSB</button>
      </div>
    </div>

    <div class="ctrl-group">
      <label>Sample Rate</label>
      <select id="rate-select">
        <option value="250000">250 kSPS</option>
        <option value="900001">900 kSPS</option>
        <option value="1024000" selected>1.024 MSPS</option>
        <option value="1200000">1.2 MSPS</option>
        <option value="2048000">2.048 MSPS</option>
        <option value="2400000">2.4 MSPS</option>
        <option value="3200000">3.2 MSPS</option>
      </select>
    </div>

    <div class="ctrl-group">
      <label>FFT Size</label>
      <select id="fft-select">
        <option value="256">256</option>
        <option value="512">512</option>
        <option value="1024" selected>1024</option>
        <option value="2048">2048</option>
        <option value="4096">4096</option>
        <option value="8192">8192</option>
        <option value="16384">16384</option>
      </select>
    </div>

    <div class="ctrl-group">
      <label>Gain: <span id="gain-val">Auto</span></label>
      <input type="range" id="gain-slider" min="0" max="496" step="1" value="0">
    </div>

    <div class="ctrl-group">
      <label>Range <span id="range-val">80</span> dB</label>
      <input type="range" id="range-slider" min="10" max="120" value="80">
    </div>

    <div class="ctrl-group">
      <label>Ref Level <span id="ref-val">0</span> dB</label>
      <input type="range" id="ref-slider" min="-80" max="40" value="0">
    </div>

    <div class="ctrl-group">
      <label>Zoom</label>
      <button id="zoom-in">+</button>
      <button id="zoom-out">-</button>
      <button id="zoom-reset">1:1</button>
      <span id="zoom-val">1x</span>
    </div>

    <div class="ctrl-group">
      <label>WF Speed <span id="wf-speed-val">50</span></label>
      <input type="range" id="wf-speed" min="5" max="100" value="50">
    </div>

    <div class="ctrl-group">
      <label>Volume: <span id="vol-val">50%</span></label>
      <input type="range" id="vol-slider" min="0" max="100" step="1" value="50">
    </div>

    <div class="ctrl-group">
      <label>Squelch: <span id="sql-val">0</span></label>
      <input type="range" id="sql-slider" min="0" max="255" step="1" value="0">
    </div>

    <div class="ctrl-group">
      <button id="audio-btn">Start Audio</button>
    </div>
  </div>
</div>
<script src="/sdr.js"></script>
</body>
</html>
