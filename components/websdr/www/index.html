<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ESP32-P4 WebSDR</title>
<style>@font-face{font-family:'DSEG7';src:url('/dseg7.woff2') format('woff2');font-display:swap}</style>
<link rel="stylesheet" href="/sdr.css">
</head>
<body>
<header id="header">
<div id="status-led"></div><span id="status-txt">Disconnected</span>
<div id="freq-display" role="group"><span class="fd" data-step="1000000000">0</span><span class="fs">.</span><span class="fd" data-step="100000000">1</span><span class="fd" data-step="10000000">4</span><span class="fd" data-step="1000000">5</span><span class="fs">.</span><span class="fd" data-step="100000">8</span><span class="fd" data-step="10000">0</span><span class="fd" data-step="1000">0</span><span class="fs">.</span><span class="fd" data-step="100">0</span><span class="fd" data-step="10">0</span><span class="fd" data-step="1">0</span><span class="freq-unit">MHz</span></div>
<div id="vfo-btns" role="group"><button class="vfo-btn active" data-vfo="A">A</button><button class="vfo-btn" data-vfo="B">B</button></div>
<div id="mode-btns" role="group"><button class="mode-btn" data-mode="AM">AM</button><button class="mode-btn active" data-mode="NFM">NFM</button><button class="mode-btn" data-mode="WBFM">WBFM</button><button class="mode-btn" data-mode="USB">USB</button><button class="mode-btn" data-mode="LSB">LSB</button><button class="mode-btn" data-mode="CW">CW</button></div>
<div id="smeter-wrap"><svg id="smeter-svg" viewBox="0 0 160 50" width="160" height="50" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
<rect width="160" height="50" rx="3" fill="#0a0a0a"/>
<path d="M20 46A60 60 0 0 1 100 46" fill="none" stroke="#0a0" stroke-width="3" stroke-linecap="round"/>
<path d="M100 46A60 60 0 0 1 140 46" fill="none" stroke="#f40" stroke-width="3" stroke-linecap="round"/>
<g fill="none" stroke="#888" stroke-width=".8"><line x1="25" y1="44" x2="27" y2="38"/><line x1="38" y1="39" x2="41" y2="33"/><line x1="55" y1="34" x2="58" y2="28"/><line x1="74" y1="30" x2="77" y2="24"/><line x1="98" y1="28" x2="100" y2="21"/><line x1="116" y1="31" x2="119" y2="25"/><line x1="130" y1="37" x2="133" y2="31"/><line x1="142" y1="44" x2="143" y2="38"/></g>
<g font-size="5" fill="#888" text-anchor="middle"><text x="22" y="36">1</text><text x="37" y="31">3</text><text x="55" y="26">5</text><text x="74" y="22">7</text><text x="98" y="19" font-size="6" fill="#aaa" font-weight="bold">9</text></g>
<g font-size="4.5" fill="#f40" text-anchor="middle"><text x="118" y="23">+20</text><text x="132" y="29">+40</text><text x="143" y="36">+60</text></g>
<text x="8" y="46" font-size="7" fill="#556655" text-anchor="middle">S</text>
<line id="smeter-peak" x1="80" y1="32" x2="80" y2="44" stroke="#fa0" stroke-width="1.5" opacity="0"/>
<g id="smeter-needle" style="transform-origin:80px 46px;transform:rotate(-70deg);transition:transform 80ms ease-out"><line x1="80" y1="46" x2="80" y2="16" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/><circle cx="80" cy="46" r="2.5" fill="#444"/></g>
</svg><span id="smeter-val">S0</span></div>
<span id="bw-val">-- BW</span><span id="rate-display">---</span><div class="hdr-spacer"></div><button id="audio-btn" aria-pressed="false">Audio</button><button id="settings-btn" aria-label="Settings">&#9881;</button>
</header>
<main id="display">
<section id="spectrum-wrap"><canvas id="spectrum"></canvas><div id="cursor-readout"></div></section>
<div id="resize-handle" role="separator" aria-orientation="horizontal" title="Drag to resize; dbl-click reset"></div>
<section id="waterfall-wrap"><canvas id="waterfall"></canvas></section>
</main>
<nav id="controls">
<div class="cg"><span class="lbl">Tune</span><input type="range" id="tune-slider" min="-50000" max="50000" value="0" step="100"><span id="tune-lbl" class="val-lbl">±0</span></div><b class="cg-sep"></b>
<div class="cg"><span class="lbl">G</span><input type="range" id="gain-slider" min="0" max="496" value="0"><span id="gain-val" class="val-lbl">Auto</span></div><b class="cg-sep"></b>
<div class="cg"><span class="lbl">Vol</span><input type="range" id="vol-slider" min="0" max="100" value="50"><span id="vol-val" class="val-lbl">50%</span></div>
<div class="cg"><span class="lbl">Sql</span><input type="range" id="sql-slider" min="0" max="255" value="0"><span id="sql-val" class="val-lbl">0</span></div><b class="cg-sep"></b>
<div class="cg"><span class="lbl">Rng</span><input type="range" id="range-slider" min="10" max="120" value="80"><span id="range-val" class="val-lbl">80</span></div>
<div class="cg"><span class="lbl">Ref</span><input type="range" id="ref-slider" min="-80" max="40" value="0"><span id="ref-val" class="val-lbl">0</span></div><b class="cg-sep"></b>
<div class="cg"><span class="lbl">Zoom</span><button class="ctrl-btn" id="zoom-out">&#8722;</button><span id="zoom-val" class="val-lbl">1x</span><button class="ctrl-btn" id="zoom-in">+</button><button class="ctrl-btn" id="zoom-reset">1:1</button></div><b class="cg-sep"></b>
<div class="cg"><span class="lbl">WF</span><input type="range" id="wf-speed" min="5" max="100" value="50"><span id="wf-speed-val" class="val-lbl">50</span></div><b class="cg-sep"></b>
<div class="cg"><span class="lbl">Rate</span><select id="rate-select"><option value="250000">250k</option><option value="900001">900k</option><option value="1024000" selected>1.024M</option><option value="1200000">1.2M</option><option value="2048000">2.048M</option><option value="2400000">2.4M</option><option value="3200000">3.2M</option></select></div>
<div class="cg"><span class="lbl">FFT</span><select id="fft-select"><option value="256">256</option><option value="512">512</option><option value="1024" selected>1024</option><option value="2048">2048</option><option value="4096">4096</option><option value="8192">8192</option></select></div><b class="cg-sep"></b>
<div class="cg"><button class="ctrl-btn" id="peak-clear">Pk Clr</button></div>
</nav>
<nav id="band-bar">
<div id="band-tabs" role="tablist"><button role="tab" class="band-tab active" data-tab="hf" aria-selected="true" aria-controls="band-panel-hf">HF</button><button role="tab" class="band-tab" data-tab="vhf" aria-selected="false" aria-controls="band-panel-vhf">VHF/UHF</button><button role="tab" class="band-tab" data-tab="bc" aria-selected="false" aria-controls="band-panel-bc">Broadcast</button></div>
<div id="band-panel-hf" class="band-panel" role="tabpanel" data-bands="160m:1900000:LSB,80m:3700000:LSB,60m:5357000:USB,40m:7100000:LSB,30m:10125000:CW,20m:14200000:USB,17m:18130000:USB,15m:21200000:USB,12m:24940000:USB,10m:28400000:USB"></div>
<div id="band-panel-vhf" class="band-panel" role="tabpanel" hidden data-bands="6m:51000000:USB,2m:145000000:NFM,70cm:433500000:NFM,23cm:1296000000:USB,ISM433:433920000:AM,ISM915:915000000:AM"></div>
<div id="band-panel-bc" class="band-panel" role="tabpanel" hidden data-bands="FM:98000000:WBFM,Air:127000000:AM,Marine:156800000:NFM,Wx162:162550000:NFM"></div>
</nav>
<dialog id="settings-dialog" aria-labelledby="settings-title">
<header><h2 id="settings-title">Settings</h2><button id="settings-close" aria-label="Close">&#10005;</button></header>
<div class="settings-body">
<section class="ss"><h3>Appearance</h3>
<label>Theme<select id="set-theme"><option value="phosphor" selected>Phosphor</option><option value="amber">Amber</option><option value="cyan">Cyan</option></select></label>
<label>Font<select id="set-freq-font"><option value="dseg7" selected>DSEG7</option><option value="mono">Mono</option></select></label>
<label>S-meter<select id="set-smeter-style"><option value="analog" selected>Analog</option><option value="bar">Bar</option><option value="digital">Digital</option></select></label>
<label>Colormap<select id="set-colormap"><option value="jet" selected>Jet</option><option value="iron">Iron</option><option value="viridis">Viridis</option><option value="phosphor">Phosphor</option><option value="grayscale">Grayscale</option></select></label>
</section>
<section class="ss"><h3>FFT &amp; Audio</h3>
<label>Avg<input type="range" id="set-fft-avg" min="0" max="99" value="50"><span id="set-fft-avg-val">0.50</span></label>
<label>Peak&#8595;<input type="range" id="set-peak-decay" min="1" max="20" value="5"><span id="set-peak-decay-val">0.5</span></label>
<label>AGC<select id="set-agc-speed"><option value="off">Off</option><option value="slow">Slow</option><option value="medium" selected>Medium</option><option value="fast">Fast</option></select></label>
<label>De-emph<select id="set-deemph"><option value="off">Off</option><option value="50us">50µs EU</option><option value="75us" selected>75µs US</option></select></label>
</section>
<section class="ss"><h3>Band tabs</h3>
<label><input type="checkbox" id="set-tab-hf" checked> HF</label>
<label><input type="checkbox" id="set-tab-vhf" checked> VHF/UHF</label>
<label><input type="checkbox" id="set-tab-bc" checked> Broadcast</label>
</section>
<section class="ss"><h3>Memory</h3>
<div id="mem-channel-list"></div><button id="mem-add-btn" class="ctrl-btn">+ Add</button>
</section>
<section class="ss"><h3>Keys</h3>
<dl id="kbd-shortcuts"><dt>F</dt><dd>Freq</dd><dt>&#8593;&#8595;</dt><dd>Tune</dd><dt>&#8592;&#8594;</dt><dd>Pan</dd><dt>+/-</dt><dd>Zoom</dd><dt>M</dt><dd>Mode</dd><dt>Space</dt><dd>Audio</dd><dt>S</dt><dd>Settings</dd><dt>P</dt><dd>Peak</dd></dl>
</section>
</div>
</dialog>
<script src="/sdr.js"></script>
</body>
</html>
